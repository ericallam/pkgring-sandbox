name: "Get image tag"
description: "Resolves the image tag from inputs, git tag (v.docker.X.Y.Z), or branch name."

inputs:
  tag:
    description: "Pre-resolved tag. If set, returned as-is."
    required: false
    default: ""

outputs:
  tag:
    description: "The resolved image tag."
    value: ${{ steps.get_tag.outputs.tag }}
  is_semver:
    description: "Whether the tag is a semantic version."
    value: ${{ steps.check_semver.outputs.is_semver }}

runs:
  using: "composite"
  steps:
    - name: Resolve tag
      id: get_tag
      shell: bash
      env:
        INPUTS_TAG: ${{ inputs.tag }}
      run: |
        if [[ -n "${INPUTS_TAG}" ]]; then
          tag="${INPUTS_TAG}"
        elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          if [[ "${GITHUB_REF_NAME}" == v.docker.* ]]; then
            version="${GITHUB_REF_NAME#v.docker.}"
            tag="v${version}"
          elif [[ "${GITHUB_REF_NAME}" == build-* ]]; then
            tag="${GITHUB_REF_NAME#build-}"
          else
            echo "Invalid git tag: ${GITHUB_REF_NAME}"
            exit 1
          fi
        elif [[ "${GITHUB_REF_NAME}" == "main" ]]; then
          tag="main"
        elif [[ "${GITHUB_REF_NAME}" == release/* ]]; then
          # release/3.5.x -> release-3.5.x (image tags can't have slashes)
          tag="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"
        else
          echo "Invalid git ref: ${GITHUB_REF}"
          exit 1
        fi
        echo "tag=${tag}" >> "$GITHUB_OUTPUT"

    - name: Validate tag
      shell: bash
      env:
        tag: ${{ steps.get_tag.outputs.tag }}
      run: |
        if [[ "${tag}" =~ ^[a-z0-9]+([._-][a-z0-9]+)*$ ]]; then
          echo "Tag is valid: ${tag}"
        else
          echo "Tag is not valid: ${tag}"
          exit 1
        fi

    - name: Check semver
      id: check_semver
      shell: bash
      env:
        tag: ${{ steps.get_tag.outputs.tag }}
      run: |
        if [[ "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
          echo "Tag is a semantic version: ${tag}"
          echo "is_semver=true" >> "$GITHUB_OUTPUT"
        else
          echo "Tag is not a semantic version: ${tag}"
          echo "is_semver=false" >> "$GITHUB_OUTPUT"
        fi
