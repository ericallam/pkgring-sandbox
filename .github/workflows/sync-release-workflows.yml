name: "Sync workflows to release branches"

# Solves the "workflow file freshness" problem.
#
# When a release/<M.m>.x branch is cut from an old tag, its workflow files
# are frozen at that point. Months later, when we ship a hotfix, the OLD
# workflows run — pinned action versions may be deprecated, build steps
# may have evolved, etc.
#
# This workflow, run on demand (or on a weekly schedule), copies the
# current main `.github/workflows/` and `.github/actions/` over each
# active `release/*` branch and opens a PR. Maintainers review, merge,
# and the release branch is now using the same workflow as main.
#
# The PR is needed because main has the org-style protection rule
# requiring approval. Same on release branches if you set them up.

on:
  workflow_dispatch:
    inputs:
      release_branch:
        description: "Specific release branch to sync (e.g. release/0.1.x). Leave blank to sync all."
        required: false
        type: string
  schedule:
    # Mondays at 10:00 UTC — early enough in the week to catch issues
    - cron: "0 10 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.list.outputs.branches }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: List branches to sync
        id: list
        env:
          INPUT_BRANCH: ${{ inputs.release_branch }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_BRANCH}" ]; then
            echo "branches=[\"${INPUT_BRANCH}\"]" >> "$GITHUB_OUTPUT"
          else
            branches=$(git ls-remote --heads origin 'release/*' | awk '{print $2}' | sed 's|refs/heads/||' | jq -R . | jq -sc .)
            echo "branches=${branches}" >> "$GITHUB_OUTPUT"
          fi
          echo "Will sync: ${branches:-${INPUT_BRANCH}}"

  sync:
    needs: discover
    if: needs.discover.outputs.branches != '[]' && needs.discover.outputs.branches != ''
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.discover.outputs.branches) }}
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Sync workflow files onto release branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_BRANCH: ${{ matrix.branch }}
        run: |
          set -euo pipefail

          # Save main's workflow files
          tmp=$(mktemp -d)
          cp -r .github/workflows "$tmp/"
          if [ -d .github/actions ]; then cp -r .github/actions "$tmp/"; fi
          if [ -d scripts ]; then cp -r scripts "$tmp/"; fi

          # Switch to the release branch
          git fetch origin "${RELEASE_BRANCH}"
          SYNC_BRANCH="sync-workflows/${RELEASE_BRANCH}"
          git checkout -B "${SYNC_BRANCH}" "origin/${RELEASE_BRANCH}"

          # Overwrite with main's versions
          rm -rf .github/workflows
          cp -r "$tmp/workflows" .github/
          if [ -d "$tmp/actions" ]; then
            rm -rf .github/actions
            cp -r "$tmp/actions" .github/
          fi
          if [ -d "$tmp/scripts" ]; then
            rm -rf scripts
            cp -r "$tmp/scripts" .
          fi

          if git diff --quiet; then
            echo "No drift between main and ${RELEASE_BRANCH} workflows. Nothing to sync."
            exit 0
          fi

          git add .github/ scripts/
          git commit -m "chore(ci): sync workflows + scripts from main into ${RELEASE_BRANCH}"
          git push -fu origin "${SYNC_BRANCH}"

          if gh pr list --repo ericallam/pkgring-sandbox --head "${SYNC_BRANCH}" --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for ${SYNC_BRANCH}; updated branch."
          else
            gh pr create \
              --base "${RELEASE_BRANCH}" \
              --head "${SYNC_BRANCH}" \
              --title "chore(ci): sync workflows from main into ${RELEASE_BRANCH}" \
              --body "Brings ${RELEASE_BRANCH} up to date with main's \`.github/workflows/\`, \`.github/actions/\`, and \`scripts/\`.

Auto-generated by [sync-release-workflows.yml](.github/workflows/sync-release-workflows.yml).

Review the diff to make sure no main-only logic accidentally rides along (e.g., features that depend on something not present on the release branch)."
          fi
