name: "Release"

# Triggers:
#   1. PR on `changeset-release/main` or `changeset-release/release/*` is merged
#      → publish whatever changesets accumulated for that branch.
#   2. workflow_dispatch with `ref` pointing at main, an ancestor of main, or a
#      release/* branch tip → manual release. Useful for re-running a failed
#      release without merging another PR, and for kicking off the first
#      release on a brand-new release/* branch.
#
# What this workflow ships:
#   - npm packages (@pkgring/*) via changesets/action
#   - Docker image (ghcr.io/ericallam/pkgring-sandbox) tagged v${VERSION}
#   - Helm chart (oci://ghcr.io/ericallam/charts/pkgring) tagged v${VERSION}
#   - GitHub release at v${VERSION}

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - prerelease
        default: "release"
      ref:
        description: "Ref to release from (branch / tag / SHA). Must be on main or a release/* branch."
        required: true
        type: string
      prerelease_tag:
        description: "npm dist-tag for prereleases (only used when type=prerelease)."
        required: false
        type: string
        default: "prerelease"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Release npm packages
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      packages: write
      id-token: write
    if: |
      github.repository == 'ericallam/pkgring-sandbox' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'release') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'changeset-release/')
        )
      )
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}
      published_package_version: ${{ steps.get_version.outputs.package_version }}
      is_latest: ${{ steps.compare.outputs.is_latest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}

      - name: Verify ref is on main or a release branch
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          set -e
          if git merge-base --is-ancestor "${INPUT_REF}" origin/main; then
            echo "Ref is reachable from main."
            exit 0
          fi
          # Look for any origin/release/* branch that contains this ref.
          for branch in $(git branch -r --list 'origin/release/*' --format '%(refname:short)'); do
            if git merge-base --is-ancestor "${INPUT_REF}" "${branch}"; then
              echo "Ref is reachable from ${branch}."
              exit 0
            fi
          done
          echo "Error: ref must be reachable from main or a release/* branch." >&2
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm 11.x for OIDC trusted publishing
        run: npm install -g npm@11.6.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build --filter "@pkgring/*"

      - name: Typecheck
        run: pnpm run typecheck --filter "@pkgring/*"

      # Decide whether this publish should become the new "latest" everywhere
      # (npm dist-tag, Docker `:latest`, GitHub release "Latest" badge).
      #
      # The right rule isn't "are we on a release branch" — it's "is this
      # version higher than the current latest." That rule handles both:
      #
      #   - Lagged hotfix: main shipped 1.5.0; hotfix 1.2.4 from release/1.2.x
      #     -> 1.2.4 < 1.5.0 -> NOT latest. Goes to dist-tag release-1.2.
      #
      #   - Fresh hotfix while main has unreleased work: main released 4.4.5,
      #     PR #3173 merged but unreleased; hotfix 4.4.6 from release/4.4.x
      #     -> 4.4.6 > 4.4.5 -> IS latest. Customers running `npm install`
      #     get the patch.
      #
      # Source of truth: npm's `latest` dist-tag for the canonical package
      # (@pkgring/core). All packages are version-locked via `fixed` in
      # changeset config so any one is canonical.
      - name: Compare new version to current latest
        id: compare
        run: |
          set -euo pipefail
          NEW=$(jq -r '.version' packages/core/package.json)
          CURRENT=$(npm view @pkgring/core dist-tags.latest 2>/dev/null || true)
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "undefined" ]; then
            CURRENT="0.0.0"
          fi

          # sort -V is semver-aware. If NEW is strictly greater than CURRENT,
          # NEW is the "highest after this publish" -> becomes latest.
          HIGHER=$(printf '%s\n%s\n' "$NEW" "$CURRENT" | sort -V | tail -1)
          if [ "$HIGHER" = "$NEW" ] && [ "$NEW" != "$CURRENT" ]; then
            IS_LATEST=true
            DIST_TAG=""
          else
            IS_LATEST=false
            DIST_TAG="release-$(echo "$NEW" | cut -d. -f1,2)"
          fi

          echo "new=${NEW}"             >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}"     >> "$GITHUB_OUTPUT"
          echo "is_latest=${IS_LATEST}" >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}"   >> "$GITHUB_OUTPUT"

          echo "::notice::Publishing ${NEW}; current latest=${CURRENT}; is_latest=${IS_LATEST}; dist_tag=${DIST_TAG:-latest}"

      - name: Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: ${{ steps.compare.outputs.dist_tag != '' && format('pnpm exec changeset publish --tag {0}', steps.compare.outputs.dist_tag) || 'pnpm exec changeset publish' }}
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve canonical version
        if: steps.changesets.outputs.published == 'true'
        id: get_version
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(echo "$PUBLISHED" | jq -r '.[0].version')
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released: ${version}"

      - name: Create GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
          VERSION: ${{ steps.get_version.outputs.package_version }}
          IS_LATEST: ${{ steps.compare.outputs.is_latest }}
        run: |
          # changesets creates per-package tags like @pkgring/core@1.0.0; we
          # additionally create a unified v${VERSION} tag for the GitHub
          # release. Don't pass --target — the existing tag's commit IS the
          # right target (lives on main OR the release branch).
          # --latest is set explicitly: GitHub's auto-detect uses publish
          # date, which would mark a lagged hotfix as "Latest" by accident.
          node scripts/generate-github-release.mjs "${VERSION}" "${PUBLISHED}" "${IS_LATEST}" > /tmp/release-body.md
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "pkgring v${VERSION}" \
            --notes-file /tmp/release-body.md \
            --latest="${IS_LATEST}"

      - name: Push v.docker.${VERSION} tag
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          git tag "v.docker.${VERSION}"
          git push origin "v.docker.${VERSION}"

      - name: Push helm-v${VERSION} tag
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          git tag "helm-v${VERSION}"
          git push origin "helm-v${VERSION}"

  publish-docker:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      image_tag: v${{ needs.release.outputs.published_package_version }}
      is_latest: ${{ needs.release.outputs.is_latest == 'true' }}

  publish-helm:
    name: Publish Helm chart
    needs: [release, publish-docker]
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release-helm.yml
    with:
      chart_version: ${{ needs.release.outputs.published_package_version }}

  dispatch-changelog:
    name: Dispatch changelog entry to pkgring-site
    needs: [release, publish-docker, publish-helm]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Read GitHub release body
        id: release_body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.published_package_version }}
        run: |
          BODY=$(gh release view "v${VERSION}" --repo ericallam/pkgring-sandbox --json body --jq '.body')
          # Use a heredoc-style multiline output (GitHub's canonical pattern)
          delim="EOF_$(uuidgen)"
          {
            echo "body<<${delim}"
            echo "${BODY}"
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch repository_dispatch event to pkgring-site
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          VERSION: ${{ needs.release.outputs.published_package_version }}
          IS_LATEST: ${{ needs.release.outputs.is_latest }}
          SOURCE_BRANCH: ${{ github.event.pull_request.base.ref || github.event.inputs.ref || 'main' }}
          BODY: ${{ steps.release_body.outputs.body }}
        run: |
          set -euo pipefail
          RELEASE_URL="https://github.com/ericallam/pkgring-sandbox/releases/tag/v${VERSION}"
          payload=$(jq -nc \
            --arg version "${VERSION}" \
            --arg isLatest "${IS_LATEST}" \
            --arg sourceBranch "${SOURCE_BRANCH}" \
            --arg releaseUrl "${RELEASE_URL}" \
            --arg body "${BODY}" \
            '{event_type: "new-release", client_payload: {version: $version, isLatest: $isLatest, sourceBranch: $sourceBranch, releaseUrl: $releaseUrl, body: $body}}')
          echo "Dispatching: $(echo "$payload" | jq -c '.client_payload | {version, isLatest, sourceBranch}')"
          echo "$payload" | gh api repos/ericallam/pkgring-site/dispatches --input -

  prerelease:
    name: Prerelease (snapshot)
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    if: github.repository == 'ericallam/pkgring-sandbox' && github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'prerelease'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm 11.x for OIDC
        run: npm install -g npm@11.6.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Snapshot version
        env:
          TAG: ${{ github.event.inputs.prerelease_tag }}
        run: pnpm exec changeset version --snapshot "$TAG"

      - name: Build
        run: pnpm run build --filter "@pkgring/*"

      - name: Publish snapshot
        env:
          TAG: ${{ github.event.inputs.prerelease_tag }}
        run: pnpm exec changeset publish --no-git-tag --snapshot --tag "$TAG"
