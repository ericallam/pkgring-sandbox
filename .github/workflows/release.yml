name: "Release"

# Triggers:
#   1. PR on `changeset-release/main` or `changeset-release/release/*` is merged
#      → publish whatever changesets accumulated for that branch.
#   2. workflow_dispatch with `ref` pointing at main, an ancestor of main, or a
#      release/* branch tip → manual release. Useful for re-running a failed
#      release without merging another PR, and for kicking off the first
#      release on a brand-new release/* branch.
#
# What this workflow ships:
#   - npm packages (@pkgring/*) via changesets/action
#   - Docker image (ghcr.io/triggerdotdev/pkgring-sandbox) tagged v${VERSION}
#   - Helm chart (oci://ghcr.io/triggerdotdev/charts/pkgring) tagged v${VERSION}
#   - GitHub release at v${VERSION}

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - prerelease
        default: "release"
      ref:
        description: "Ref to release from (branch / tag / SHA). Must be on main or a release/* branch."
        required: true
        type: string
      prerelease_tag:
        description: "npm dist-tag for prereleases (only used when type=prerelease)."
        required: false
        type: string
        default: "prerelease"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Release npm packages
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      packages: write
      id-token: write
    if: |
      github.repository == 'triggerdotdev/pkgring-sandbox' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'release') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'changeset-release/')
        )
      )
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}
      published_package_version: ${{ steps.get_version.outputs.package_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}

      - name: Verify ref is on main or a release branch
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          set -e
          if git merge-base --is-ancestor "${INPUT_REF}" origin/main; then
            echo "Ref is reachable from main."
            exit 0
          fi
          # Look for any origin/release/* branch that contains this ref.
          for branch in $(git branch -r --list 'origin/release/*' --format '%(refname:short)'); do
            if git merge-base --is-ancestor "${INPUT_REF}" "${branch}"; then
              echo "Ref is reachable from ${branch}."
              exit 0
            fi
          done
          echo "Error: ref must be reachable from main or a release/* branch." >&2
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm 11.x for OIDC trusted publishing
        run: npm install -g npm@11.6.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build --filter "@pkgring/*"

      - name: Typecheck
        run: pnpm run typecheck --filter "@pkgring/*"

      - name: Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run changeset:release
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve canonical version
        if: steps.changesets.outputs.published == 'true'
        id: get_version
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(echo "$PUBLISHED" | jq -r '.[0].version')
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released: ${version}"

      - name: Create GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          # The release tag is whatever changesets created. We pick "v${VERSION}"
          # as the unified one. We don't pass --target so the release attaches
          # to the existing tag (which lives on main OR the release branch).
          node scripts/generate-github-release.mjs "${VERSION}" "${PUBLISHED}" > /tmp/release-body.md
          # Create a v${VERSION} git tag here (changesets creates per-package
          # tags like @pkgring/core@1.0.0, but we want one unified tag).
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" \
            --title "pkgring v${VERSION}" \
            --notes-file /tmp/release-body.md

      - name: Push v.docker.${VERSION} tag
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          git tag "v.docker.${VERSION}"
          git push origin "v.docker.${VERSION}"

      - name: Push helm-v${VERSION} tag
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          git tag "helm-v${VERSION}"
          git push origin "helm-v${VERSION}"

  publish-docker:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      image_tag: v${{ needs.release.outputs.published_package_version }}

  publish-helm:
    name: Publish Helm chart
    needs: [release, publish-docker]
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release-helm.yml
    with:
      chart_version: ${{ needs.release.outputs.published_package_version }}

  prerelease:
    name: Prerelease (snapshot)
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    if: github.repository == 'triggerdotdev/pkgring-sandbox' && github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'prerelease'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm 11.x for OIDC
        run: npm install -g npm@11.6.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Snapshot version
        env:
          TAG: ${{ github.event.inputs.prerelease_tag }}
        run: pnpm exec changeset version --snapshot "$TAG"

      - name: Build
        run: pnpm run build --filter "@pkgring/*"

      - name: Publish snapshot
        env:
          TAG: ${{ github.event.inputs.prerelease_tag }}
        run: pnpm exec changeset publish --no-git-tag --snapshot --tag "$TAG"
