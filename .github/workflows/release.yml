name: "Release"

# Triggers:
#   1. PR on `changeset-release/main` or `changeset-release/release/*` is merged
#      → publish whatever changesets accumulated for that branch.
#   2. workflow_dispatch with `ref` pointing at main, an ancestor of main, or a
#      release/* branch tip → manual release. Useful for re-running a failed
#      release without merging another PR, and for kicking off the first
#      release on a brand-new release/* branch.
#
# What this workflow ships:
#   - npm packages (@pkgring/*) via changesets/action
#   - Docker image (ghcr.io/ericallam/pkgring-sandbox) tagged v${VERSION}
#   - Helm chart (oci://ghcr.io/ericallam/charts/pkgring) tagged v${VERSION}
#   - GitHub release at v${VERSION}
#
# Three release shapes are supported by the same path:
#
#   - **Stable on main**: highest-ever version → npm `latest`, Docker `:latest`,
#     `:release-X.Y` line tag, GitHub Latest badge, marketing-site dispatch.
#   - **Lagged hotfix on a release branch**: version is lower than current npm
#     `latest` → publishes under `release-X.Y` dist-tag, NO Docker `:latest`,
#     but DOES update `:release-X.Y` line tag, NO GitHub Latest badge,
#     still dispatches the changelog.
#   - **Release candidate via changesets pre mode**: version contains a hyphen
#     (e.g. `0.5.0-rc.0`) → changesets `publish` reads `.changeset/pre.json`
#     and uses the pre-mode dist-tag (e.g. `rc`). NO npm `latest`, NO Docker
#     `:latest`, NO `:release-X.Y` line tag, GitHub release marked as
#     Pre-release, marketing-site dispatch is skipped.
#
# Prereleases are detected by hyphen-in-version and override the version-
# comparison "latest" rule — an RC is never Latest, regardless of how it
# sorts against the current npm latest.

on:
  pull_request:
    types: [closed]
    branches:
      - main
      - "release/**"
  workflow_dispatch:
    inputs:
      type:
        description: "Release type"
        required: true
        type: choice
        options:
          - release
          - prerelease
        default: "release"
      ref:
        description: "Ref to release from (branch / tag / SHA). Must be on main or a release/* branch."
        required: true
        type: string
      prerelease_tag:
        description: "npm dist-tag for prereleases (only used when type=prerelease)."
        required: false
        type: string
        default: "prerelease"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    name: Release npm packages
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: write
      packages: write
      id-token: write
    if: |
      github.repository == 'ericallam/pkgring-sandbox' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'release') ||
        (
          github.event_name == 'pull_request' &&
          github.event.pull_request.merged == true &&
          startsWith(github.event.pull_request.head.ref, 'changeset-release/')
        )
      )
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      published_packages: ${{ steps.changesets.outputs.publishedPackages }}
      published_package_version: ${{ steps.get_version.outputs.package_version }}
      is_latest: ${{ steps.compare.outputs.is_latest }}
      is_prerelease: ${{ steps.compare.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.ref || github.sha }}

      - name: Verify ref is on main or a release branch
        if: github.event_name == 'workflow_dispatch'
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
        run: |
          set -e
          if git merge-base --is-ancestor "${INPUT_REF}" origin/main; then
            echo "Ref is reachable from main."
            exit 0
          fi
          # Look for any origin/release/* branch that contains this ref.
          for branch in $(git branch -r --list 'origin/release/*' --format '%(refname:short)'); do
            if git merge-base --is-ancestor "${INPUT_REF}" "${branch}"; then
              echo "Ref is reachable from ${branch}."
              exit 0
            fi
          done
          echo "Error: ref must be reachable from main or a release/* branch." >&2
          exit 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm 11.x for OIDC trusted publishing
        run: npm install -g npm@11.6.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm run build --filter "@pkgring/*"

      - name: Typecheck
        run: pnpm run typecheck --filter "@pkgring/*"

      # Decide three things about this publish:
      #
      #   - is_prerelease: does the version have a hyphen? (e.g. 0.5.0-rc.0)
      #     Prereleases are pre-mode RC publishes; changesets/action picks
      #     the npm dist-tag from .changeset/pre.json.
      #
      #   - is_latest:    should this claim "latest" everywhere (npm,
      #                   Docker :latest, GitHub Latest badge)?
      #
      #   - dist_tag:     what to pass to `changeset publish --tag <X>`.
      #
      # is_latest = (NEW > current npm latest) AND NOT is_prerelease.
      # The version-comparison part handles the hotfix case: a lagged hotfix
      # on release/1.2.x while main is at 1.5.x is lower than latest, so
      # not-latest. A fresh hotfix on release/4.4.x while main released
      # 4.4.5 but has unreleased 4.5.x work is higher, so latest.
      # The prerelease override is what stops 0.5.0-rc.0 from claiming
      # latest just because it sorts higher than 0.4.5.
      - name: Compare new version to current latest
        id: compare
        run: |
          set -euo pipefail
          NEW=$(jq -r '.version' packages/core/package.json)
          CURRENT=$(npm view @pkgring/core dist-tags.latest 2>/dev/null || true)
          if [ -z "$CURRENT" ] || [ "$CURRENT" = "undefined" ]; then
            CURRENT="0.0.0"
          fi

          # Any semver with a hyphen is a prerelease (0.5.0-rc.0, 0.5.0-beta.1, …).
          if [[ "$NEW" == *-* ]]; then
            IS_PRERELEASE=true
          else
            IS_PRERELEASE=false
          fi

          # sort -V is semver-aware. Would NEW be the new highest-version
          # after publish?
          HIGHER=$(printf '%s\n%s\n' "$NEW" "$CURRENT" | sort -V | tail -1)
          if [ "$HIGHER" = "$NEW" ] && [ "$NEW" != "$CURRENT" ]; then
            IS_HIGHER=true
          else
            IS_HIGHER=false
          fi

          # A prerelease never becomes the canonical latest, even if it
          # sorts higher than current. Otherwise, latest follows
          # highest-version.
          if [ "$IS_PRERELEASE" = "true" ]; then
            IS_LATEST=false
          elif [ "$IS_HIGHER" = "true" ]; then
            IS_LATEST=true
          else
            IS_LATEST=false
          fi

          # npm dist-tag passed to `changeset publish --tag <X>`:
          #   - Prerelease  → no --tag (changesets uses pre.json.tag)
          #   - Latest      → no --tag (changesets defaults to "latest")
          #   - Lagged hotfix → "release-X.Y"
          if [ "$IS_PRERELEASE" = "true" ]; then
            DIST_TAG=""
          elif [ "$IS_LATEST" = "true" ]; then
            DIST_TAG=""
          else
            DIST_TAG="release-$(echo "$NEW" | cut -d. -f1,2)"
          fi

          echo "new=${NEW}"                      >> "$GITHUB_OUTPUT"
          echo "current=${CURRENT}"              >> "$GITHUB_OUTPUT"
          echo "is_prerelease=${IS_PRERELEASE}"  >> "$GITHUB_OUTPUT"
          echo "is_latest=${IS_LATEST}"          >> "$GITHUB_OUTPUT"
          echo "dist_tag=${DIST_TAG}"            >> "$GITHUB_OUTPUT"

          echo "::notice::Publishing ${NEW}; current latest=${CURRENT}; is_prerelease=${IS_PRERELEASE}; is_latest=${IS_LATEST}; dist_tag=${DIST_TAG:-(default)}"

      - name: Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          publish: ${{ steps.compare.outputs.dist_tag != '' && format('pnpm exec changeset publish --tag {0}', steps.compare.outputs.dist_tag) || 'pnpm exec changeset publish' }}
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve canonical version
        if: steps.changesets.outputs.published == 'true'
        id: get_version
        env:
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
        run: |
          version=$(echo "$PUBLISHED" | jq -r '.[0].version')
          echo "package_version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released: ${version}"

      - name: Create GitHub release
        if: steps.changesets.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISHED: ${{ steps.changesets.outputs.publishedPackages }}
          VERSION: ${{ steps.get_version.outputs.package_version }}
          IS_LATEST: ${{ steps.compare.outputs.is_latest }}
          IS_PRERELEASE: ${{ steps.compare.outputs.is_prerelease }}
        run: |
          # changesets creates per-package tags like @pkgring/core@1.0.0; we
          # additionally create a unified v${VERSION} tag for the GitHub
          # release. Don't pass --target — the existing tag's commit IS the
          # right target (lives on main OR the release branch).
          # --latest is set explicitly: GitHub's auto-detect uses publish
          # date, which would mark a lagged hotfix as "Latest" by accident.
          # --prerelease is set for RC publishes (hyphen in version) so the
          # release page shows the Pre-release badge.
          node scripts/generate-github-release.mjs "${VERSION}" "${PUBLISHED}" "${IS_LATEST}" "${IS_PRERELEASE}" > /tmp/release-body.md
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          PRERELEASE_FLAG=""
          if [ "${IS_PRERELEASE}" = "true" ]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "v${VERSION}" \
            --title "pkgring v${VERSION}" \
            --notes-file /tmp/release-body.md \
            --latest="${IS_LATEST}" \
            ${PRERELEASE_FLAG}

      - name: Push v.docker.${VERSION} tag
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          git tag "v.docker.${VERSION}"
          git push origin "v.docker.${VERSION}"

      - name: Push helm-v${VERSION} tag
        if: steps.changesets.outputs.published == 'true'
        env:
          VERSION: ${{ steps.get_version.outputs.package_version }}
        run: |
          git tag "helm-v${VERSION}"
          git push origin "helm-v${VERSION}"

  publish-docker:
    name: Publish Docker image
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: ./.github/workflows/publish.yml
    with:
      image_tag: v${{ needs.release.outputs.published_package_version }}
      is_latest: ${{ needs.release.outputs.is_latest == 'true' }}
      is_prerelease: ${{ needs.release.outputs.is_prerelease == 'true' }}

  publish-helm:
    name: Publish Helm chart
    needs: [release, publish-docker]
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/release-helm.yml
    with:
      chart_version: ${{ needs.release.outputs.published_package_version }}

  dispatch-changelog:
    name: Dispatch changelog entry to pkgring-site
    needs: [release, publish-docker, publish-helm]
    # Skip the marketing-site changelog dispatch for prereleases — multiple
    # RCs would file multiple changelog PRs for what is conceptually one
    # release. The eventual stable will fire this with the cumulative notes.
    if: needs.release.outputs.published == 'true' && needs.release.outputs.is_prerelease != 'true'
    runs-on: ubuntu-latest
    permissions: {}
    steps:
      - name: Read GitHub release body
        id: release_body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.published_package_version }}
        run: |
          BODY=$(gh release view "v${VERSION}" --repo ericallam/pkgring-sandbox --json body --jq '.body')
          # Use a heredoc-style multiline output (GitHub's canonical pattern)
          delim="EOF_$(uuidgen)"
          {
            echo "body<<${delim}"
            echo "${BODY}"
            echo "${delim}"
          } >> "$GITHUB_OUTPUT"

      - name: Dispatch repository_dispatch event to pkgring-site
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_PAT }}
          VERSION: ${{ needs.release.outputs.published_package_version }}
          IS_LATEST: ${{ needs.release.outputs.is_latest }}
          SOURCE_BRANCH: ${{ github.event.pull_request.base.ref || github.event.inputs.ref || 'main' }}
          BODY: ${{ steps.release_body.outputs.body }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN}" ]; then
            echo "::warning::CROSS_REPO_PAT is not set on this repo. Skipping changelog dispatch."
            echo "::warning::Add a fine-grained PAT with Contents:write on ericallam/pkgring-site as secret CROSS_REPO_PAT."
            exit 0
          fi
          RELEASE_URL="https://github.com/ericallam/pkgring-sandbox/releases/tag/v${VERSION}"
          payload=$(jq -nc \
            --arg version "${VERSION}" \
            --arg isLatest "${IS_LATEST}" \
            --arg sourceBranch "${SOURCE_BRANCH}" \
            --arg releaseUrl "${RELEASE_URL}" \
            --arg body "${BODY}" \
            '{event_type: "new-release", client_payload: {version: $version, isLatest: $isLatest, sourceBranch: $sourceBranch, releaseUrl: $releaseUrl, body: $body}}')
          echo "Dispatching: $(echo "$payload" | jq -c '.client_payload | {version, isLatest, sourceBranch}')"
          echo "$payload" | gh api repos/ericallam/pkgring-site/dispatches --input -

  prerelease:
    name: Prerelease (snapshot)
    runs-on: ubuntu-latest
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    if: github.repository == 'ericallam/pkgring-sandbox' && github.event_name == 'workflow_dispatch' && github.event.inputs.type == 'prerelease'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.ref }}
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"
          registry-url: "https://registry.npmjs.org"

      - name: Setup npm 11.x for OIDC
        run: npm install -g npm@11.6.4

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Snapshot version
        env:
          TAG: ${{ github.event.inputs.prerelease_tag }}
        run: pnpm exec changeset version --snapshot "$TAG"

      - name: Build
        run: pnpm run build --filter "@pkgring/*"

      - name: Publish snapshot
        env:
          TAG: ${{ github.event.inputs.prerelease_tag }}
        run: pnpm exec changeset publish --no-git-tag --snapshot --tag "$TAG"
