name: "Changesets PR"

# Opens / refreshes the auto "Version Packages" PR for the branch the
# changesets live on. Runs on main AND release/* branches so hotfix flows
# get the same automation as normal releases.
#
# changesets/action picks up the current branch name and opens a PR named
# `changeset-release/<branch>`. For main that's `changeset-release/main`;
# for release/3.5.x that's `changeset-release/release/3.5.x`.

on:
  push:
    branches:
      - main
      - "release/**"
    paths:
      - "packages/**"
      - "apps/**"
      - "charts/**"
      - ".changeset/**"
      - "package.json"
      - "pnpm-lock.yaml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-pr:
    name: Open / update Version Packages PR
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: "pnpm"

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create / update release PR
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm run changeset:version
          commit: "chore: release"
          title: "chore: release"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post-process release PR branch (Chart.yaml + .app-notes)
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # changesets/action committed the version bump to changeset-release/<source-branch>.
          # Two finishing touches on that branch, atomic with the version bump:
          #   1. stamp Chart.yaml to match the bumped package version
          #   2. delete consumed .app-notes/*.md files (kept the README)
          # Both ride on the same PR so merging it is one atomic "release prep".
          SOURCE_BRANCH="${GITHUB_REF_NAME}"
          PR_BRANCH="changeset-release/${SOURCE_BRANCH}"

          # Explicit refspec so the remote-tracking ref `origin/${PR_BRANCH}`
          # is created (a bare `git fetch origin BRANCH` only updates FETCH_HEAD).
          git fetch origin "+${PR_BRANCH}:refs/remotes/origin/${PR_BRANCH}" || { echo "PR branch not found; nothing to do."; exit 0; }

          NEW_VERSION=$(git show "origin/${PR_BRANCH}:packages/core/package.json" | jq -r '.version')
          if [ -z "$NEW_VERSION" ] || [ "$NEW_VERSION" = "null" ]; then
            echo "Could not read version from release PR branch."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B "${PR_BRANCH}" "origin/${PR_BRANCH}"

          # 1. Stamp Chart.yaml
          tmp=$(mktemp)
          awk -v v="$NEW_VERSION" '
            /^version:/    { print "version: " v; next }
            /^appVersion:/ { print "appVersion: \"" v "\""; next }
            { print }
          ' charts/pkgring/Chart.yaml > "$tmp" && mv "$tmp" charts/pkgring/Chart.yaml

          # 2. Consume .app-notes (delete every *.md except README.md)
          if [ -d .app-notes ]; then
            find .app-notes -type f -name '*.md' ! -name 'README.md' -delete
          fi

          # Stage everything and check if the commit would have content.
          # `git add -A` is robust to whichever subset of paths actually exists.
          git add -A
          if git diff --cached --quiet; then
            echo "No post-process changes to commit."
          else
            git commit -m "chore: stamp Chart.yaml to v${NEW_VERSION} and consume .app-notes"
            git push origin "${PR_BRANCH}"
          fi

      - name: Enhance release PR title and body
        if: steps.changesets.outputs.hasChangesets == 'true' && steps.changesets.outputs.published != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SOURCE_BRANCH="${GITHUB_REF_NAME}"
          PR_BRANCH="changeset-release/${SOURCE_BRANCH}"
          PR_NUMBER=$(gh pr list --repo ericallam/pkgring-sandbox --head "${PR_BRANCH}" --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            echo "No release PR open."
            exit 0
          fi
          NEW_VERSION=$(git show "origin/${PR_BRANCH}:packages/core/package.json" | jq -r '.version')
          PR_NUMBER="$PR_NUMBER" SOURCE_BRANCH="$SOURCE_BRANCH" NEW_VERSION="$NEW_VERSION" \
            node scripts/enhance-release-pr.mjs
