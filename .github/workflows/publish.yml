name: "Publish Docker"

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to publish (e.g. v1.2.3)."
        required: true
        type: string
      is_latest:
        description: "Whether this version should also tag :latest. release.yml computes this via version comparison."
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v.docker.*"
      - "build-*"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish."
        required: false
        type: string
      is_latest:
        description: "Tag this build as :latest as well? Manual override."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  publish-web:
    name: Build & push web image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      tag: ${{ steps.get_tag.outputs.tag }}
      is_semver: ${{ steps.get_tag.outputs.is_semver }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Resolve image tag
        id: get_tag
        uses: ./.github/actions/get-image-tag
        with:
          tag: ${{ inputs.image_tag }}

      - name: Build info
        id: build_info
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          IS_SEMVER: ${{ steps.get_tag.outputs.is_semver }}
        run: |
          {
            if [[ "$IS_SEMVER" == "true" ]]; then
              echo "BUILD_APP_VERSION=$TAG"
            else
              echo "BUILD_APP_VERSION=$TAG"
            fi
            echo "BUILD_GIT_SHA=${GITHUB_SHA}"
            echo "BUILD_GIT_REF_NAME=${GITHUB_REF_NAME}"
            echo "BUILD_TIMESTAMP_SECONDS=$(date +%s)"
          } >> "$GITHUB_OUTPUT"

      - name: Compute image tags
        id: compute_tags
        env:
          TAG: ${{ steps.get_tag.outputs.tag }}
          IS_SEMVER: ${{ steps.get_tag.outputs.is_semver }}
          IS_LATEST: ${{ inputs.is_latest }}
        run: |
          set -e
          repo="ghcr.io/ericallam/pkgring-sandbox"
          tags="$repo:$TAG"

          if [[ "$IS_SEMVER" == "true" ]]; then
            # Strip leading 'v' to get the bare version (e.g. v0.1.2 -> 0.1.2)
            VERSION="${TAG#v}"
            MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)

            # Per-line floating tag (analog of npm "release-X.Y" dist-tag,
            # and of trigger.dev's :v4-beta). Always set on a semver build
            # — line-pinned consumers always get the latest patch on their
            # line, regardless of whether it's the global :latest.
            tags="$tags,$repo:release-${MAJOR_MINOR}"

            # Global :latest only updated when release.yml decided this
            # version is the highest-ever (is_latest input). The decision
            # is centralized in release.yml; publish.yml just trusts it.
            if [[ "$IS_LATEST" == "true" ]]; then
              tags="$tags,$repo:latest"
            fi
          fi

          echo "tags=$tags" >> "$GITHUB_OUTPUT"
          echo "::notice::Docker tags: $tags"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.compute_tags.outputs.tags }}
          push: true
          provenance: true
          sbom: true
          build-args: |
            BUILD_APP_VERSION=${{ steps.build_info.outputs.BUILD_APP_VERSION }}
            BUILD_GIT_SHA=${{ steps.build_info.outputs.BUILD_GIT_SHA }}
            BUILD_GIT_REF_NAME=${{ steps.build_info.outputs.BUILD_GIT_REF_NAME }}
            BUILD_TIMESTAMP_SECONDS=${{ steps.build_info.outputs.BUILD_TIMESTAMP_SECONDS }}
