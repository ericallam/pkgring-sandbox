name: "Release Helm chart"

on:
  push:
    tags:
      - "helm-v*"
  workflow_call:
    inputs:
      chart_version:
        description: "Chart version to release."
        required: true
        type: string
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Chart version to release."
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  CHART_NAME: pkgring

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.18.3"

      - name: Lint chart
        run: helm lint ./charts/pkgring

      - name: Render templates
        run: |
          helm template test-release ./charts/pkgring \
            --values ./charts/pkgring/values.yaml \
            --set image.tag=v0.0.0 \
            --output-dir ./helm-output

      - name: Validate manifests
        uses: docker://ghcr.io/yannh/kubeconform:v0.7.0
        with:
          entrypoint: "/kubeconform"
          args: "-summary -output json ./helm-output"

  release:
    needs: lint-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.18.3"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve chart version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.chart_version }}
        run: |
          if [ -n "${INPUT_VERSION}" ]; then
            VERSION="${INPUT_VERSION}"
          else
            VERSION="${GITHUB_REF_NAME}"
            VERSION="${VERSION#helm-v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Stamp Chart.yaml to release version
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          # The Chart.yaml on disk is the in-tree "0.0.0" template; the release
          # commit may not have been bumped (e.g. workflow_dispatch from a tag
          # that pre-dates the bump commit). Just rewrite both fields.
          tmp=$(mktemp)
          awk -v v="$VERSION" '
            /^version:/    { print "version: " v; next }
            /^appVersion:/ { print "appVersion: \"" v "\""; next }
            { print }
          ' charts/pkgring/Chart.yaml > "$tmp" && mv "$tmp" charts/pkgring/Chart.yaml
          cat charts/pkgring/Chart.yaml

      - name: Package chart
        run: helm package ./charts/pkgring --destination /tmp/

      - name: Push chart to GHCR OCI registry
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          chart_pkg="/tmp/${CHART_NAME}-${VERSION}.tgz"
          helm push "$chart_pkg" "oci://${REGISTRY}/${{ github.repository_owner }}/charts"

      - name: GitHub release for chart
        uses: softprops/action-gh-release@v2
        with:
          tag_name: helm-v${{ steps.version.outputs.version }}
          name: "Helm chart ${{ steps.version.outputs.version }}"
          body: |
            ### Install

            ```bash
            helm upgrade --install pkgring \
              oci://${{ env.REGISTRY }}/${{ github.repository_owner }}/charts/pkgring \
              --version "${{ steps.version.outputs.version }}"
            ```
          files: |
            /tmp/${{ env.CHART_NAME }}-${{ steps.version.outputs.version }}.tgz
          token: ${{ secrets.GITHUB_TOKEN }}
